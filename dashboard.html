<style>
  :root{
    --navy:#064187; --navy-deep:#04305f; --navy-black:#031f42;
    --teal:#0A89A3; --teal-soft:#e4f3f6;
    --amber:#E3A008; --green:#1f9d55; --red:#d64545;
    --ink:#0B1220; --slate:#5B6B7C; --paper:#F5F7F9; --white:#FFFFFF; --line:#E3E8EC;
    /* WCAG AA-compliant (4.5:1+) text variants of the semantic colors above.
       The base colors are kept for backgrounds, dots, and borders; anywhere text
       actually needs to be read, one of these is used instead. */
    --teal-text:#087287; --amber-text:#8a6205; --green-text:#187b42; --red-text:#bd3d3d; --purple-text:#6e51e1;
    --teal-solid:#098199;
  }
  html[data-theme="dark"]{
    --teal-soft:#0f2f38;
    --ink:#E7EDF3; --slate:#93A4B8; --paper:#0B121C; --white:#111A26; --line:#233042;
    --teal-text:#40a3b7; --amber-text:#e3a008; --green-text:#1f9d55; --red-text:#d95454; --purple-text:#8669ff;
  }
  html[data-theme="dark"] body{ background:var(--paper); }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'DM Sans',sans-serif; color:var(--ink); background:var(--paper); display:flex; min-height:100vh; transition:background .2s, color .2s;}
  h1,h2,h3{font-family:'Barlow Condensed',sans-serif; font-weight:900; line-height:.92; color:var(--navy-deep);}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer; border:none;}
  input,select,textarea{font-family:inherit; font-size:13px;}

  /* SIDEBAR */
  .sidebar{width:240px; min-width:240px; background:linear-gradient(180deg,var(--navy-black),var(--navy-deep)); color:#fff; display:flex; flex-direction:column; height:100vh; position:sticky; top:0;}
  .side-brand{display:flex; align-items:center; gap:10px; padding:22px 20px 20px; border-bottom:1px solid rgba(255,255,255,.08);}
  .mark{width:36px; height:36px; border-radius:9px; background:#fff; display:flex; align-items:center; justify-content:center; padding:6px; box-shadow:0 2px 8px rgba(0,0,0,.18);} .mark img{width:100%; height:100%; object-fit:contain; display:block;}
  .side-brand .name{font-size:14.5px; font-weight:700;}
  .side-brand .name span{display:block; font-size:10.5px; font-weight:500; color:#8fb4de; letter-spacing:1px; text-transform:uppercase; margin-top:1px;}
  nav.side-nav{padding:18px 12px; flex:1; overflow-y:auto;}
  .nav-label{font-size:10.5px; text-transform:uppercase; letter-spacing:1.2px; color:#5f83ac; font-weight:700; padding:14px 10px 8px;}
  .nav-item{display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:8px; margin-bottom:2px; font-size:13.5px; font-weight:500; color:#c3d6ec; position:relative; transition:background .15s,color .15s;}
  .nav-item svg{width:17px; height:17px; opacity:.85; flex-shrink:0;}
  .nav-item:hover{background:rgba(255,255,255,.06); color:#fff;}
  .nav-item.active{background:rgba(10,137,163,.22); color:#fff; font-weight:700;}
  .nav-item.active::before{content:''; position:absolute; left:-12px; top:8px; bottom:8px; width:3px; background:var(--teal); border-radius:0 3px 3px 0;}
  .nav-count{margin-left:auto; font-family:'JetBrains Mono'; font-size:10.5px; background:rgba(255,255,255,.1); padding:2px 7px; border-radius:99px; color:#c3d6ec;}
  .nav-item.active .nav-count{background:var(--teal-solid); color:#fff;}
  .side-foot{padding:16px 20px; border-top:1px solid rgba(255,255,255,.08); display:flex; align-items:center; gap:10px;}
  .avatar{width:32px; height:32px; border-radius:50%; background:var(--teal-solid); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#fff; flex-shrink:0;}
  .side-foot:hover{background:rgba(255,255,255,.04);}
  .side-foot .who{font-size:12.5px; font-weight:700;}
  .side-foot .role{font-size:10.5px; color:#8fb4de;}

  /* MAIN */
  main{flex:1; min-width:0; background:var(--paper);}
  .topbar{display:flex; align-items:center; justify-content:space-between; padding:18px 32px; background:var(--white); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:10;}
  .search{display:flex; align-items:center; gap:8px; background:var(--paper); border:1px solid var(--line); border-radius:8px; padding:9px 14px; width:320px; color:var(--slate); font-size:13px;}
  .search input{background:none; border:none; outline:none; width:100%; color:var(--ink);}
  .search svg{width:15px; height:15px; opacity:.6; flex-shrink:0;}
  .top-actions{display:flex; align-items:center; gap:12px;}
  .btn-new{background:var(--navy); color:#fff; padding:10px 18px; border-radius:7px; font-size:13px; font-weight:700; display:flex; align-items:center; gap:6px;}
  .btn-new:hover{background:var(--navy-deep);}
  .icon-btn{width:38px; height:38px; border-radius:7px; background:var(--paper); border:1px solid var(--line); color:var(--slate); display:flex; align-items:center; justify-content:center; position:relative;}
  .icon-btn:hover{background:var(--teal-soft); color:var(--teal); border-color:var(--teal);}
  .notif-badge{position:absolute; top:-5px; right:-5px; background:var(--red); color:#fff; font-size:10px; font-weight:700; min-width:16px; height:16px; border-radius:99px; display:flex; align-items:center; justify-content:center; padding:0 3px;}
  .notif-item{padding:11px 14px; border-bottom:1px solid var(--line); font-size:12.5px;}
  .notif-item:last-child{border-bottom:none;}
  .notif-item .ni-msg{color:var(--ink); font-weight:600;}
  .notif-item .ni-time{color:var(--slate); font-size:10.5px; margin-top:2px;}
  .notif-item.unread{background:var(--teal-soft);}

  .content{padding:30px 32px 60px; background:var(--paper);}
  .page-head{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:24px; flex-wrap:wrap; gap:12px;}
  .page-head h1{font-size:32px;}
  .page-head p{color:var(--slate); font-size:13.5px; margin-top:2px;}
  .date-pill{font-size:12px; font-weight:600; color:var(--slate); background:var(--white); border:1px solid var(--line); padding:8px 14px; border-radius:8px;}

  .stat-row{display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px;}
  .stat-card{background:var(--white); border:1px solid var(--line); border-radius:12px; padding:20px;}
  .stat-top{display:flex; justify-content:space-between; align-items:flex-start;}
  .stat-icon{width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center;}
  .stat-icon svg{width:17px; height:17px;}
  .stat-icon.blue{background:var(--teal-soft); color:var(--teal-text);}
  .stat-icon.amber{background:#fdf2dc; color:var(--amber-text);}
  .stat-icon.green{background:#e5f6ea; color:var(--green-text);}
  .stat-icon.navy{background:#e7eef8; color:var(--navy);}
  .stat-card h2{font-size:32px; margin-top:14px;}
  .stat-card .label{font-size:12.5px; color:var(--slate); margin-top:4px; font-weight:500;}

  .grid-2{display:grid; grid-template-columns:1.4fr 1fr; gap:16px; margin-bottom:16px;}
  .panel{background:var(--white); border:1px solid var(--line); border-radius:12px; overflow:hidden;}
  .panel-head{display:flex; justify-content:space-between; align-items:center; padding:18px 20px; border-bottom:1px solid var(--line);}
  .panel-head h3{font-size:19px; font-weight:700; font-family:'DM Sans'; color:var(--ink);}
  .panel-head a.view-all{font-size:12px; font-weight:700; color:var(--teal-text); cursor:pointer;}

  table{width:100%; border-collapse:collapse;}
  thead th{text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.8px; color:var(--slate); padding:10px 20px; border-bottom:1px solid var(--line); font-weight:700;}
  tbody td{padding:13px 20px; font-size:13px; border-bottom:1px solid var(--line); vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr{cursor:pointer;}
  tbody tr:hover{background:var(--paper);}
  .lead-name{font-weight:700; color:var(--ink);}
  .lead-sub{font-size:11.5px; color:var(--slate); margin-top:1px;}
  .badge{font-size:11px; font-weight:700; padding:4px 10px; border-radius:99px; display:inline-block;}
  .badge.prospect{background:#eef0f4; color:var(--slate);}
  .badge.lead{background:#e7eef8; color:var(--navy);}
  .badge.customer{background:#e5f6ea; color:var(--green-text);}
  .badge.past_customer{background:#f2e9fb; color:var(--purple-text);}
  .badge.hot{background:#fdf2dc; color:var(--amber-text);}
  .src{font-size:12px; color:var(--slate);}
  .empty-row td{text-align:center; color:var(--slate); padding:30px 20px; font-size:13px;}

  .followup-list{padding:8px 0;}
  .fu-item{display:flex; align-items:center; gap:12px; padding:13px 20px; border-bottom:1px solid var(--line);}
  .fu-item:last-child{border-bottom:none;}
  .fu-check{width:19px; height:19px; border-radius:5px; border:1.5px solid var(--line); flex-shrink:0; display:flex; align-items:center; justify-content:center;}
  .fu-check.overdue{border-color:var(--red); background:#fbe9e9;}
  .fu-check.done{background:var(--green); border-color:var(--green);}
  .fu-check svg{width:12px; height:12px; color:#fff;}
  .fu-body{flex:1; min-width:0;}
  .fu-name{font-size:13px; font-weight:700; color:var(--ink);}
  .fu-note{font-size:11.5px; color:var(--slate); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .fu-due{font-size:11px; font-weight:700; padding:4px 9px; border-radius:6px; white-space:nowrap;}
  .fu-due.today{background:#fdf2dc; color:var(--amber-text);}
  .fu-due.overdue{background:#fbe9e9; color:var(--red-text);}
  .fu-due.soon{background:var(--teal-soft); color:var(--teal-text);}
  .fu-due.done{background:#e5f6ea; color:var(--green-text);}

  .kpi-head-row{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:8px;}
  .kpi-flag{display:flex; align-items:center; gap:6px; font-size:11px; font-weight:700; color:var(--green-text); background:#e5f6ea; padding:5px 11px; border-radius:99px;}
  .kpi-flag svg{width:12px; height:12px;}
  .kpi-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:16px;}
  .kpi-card{background:var(--white); border:1px solid var(--line); border-radius:12px; padding:20px;}
  .kpi-card .k-label{font-size:12px; font-weight:700; color:var(--slate); margin-bottom:10px;}
  .kpi-card .k-value{font-size:30px; font-family:'Barlow Condensed'; font-weight:900; color:var(--navy-deep);}
  .kpi-card .k-formula{font-family:'JetBrains Mono'; font-size:10.5px; color:var(--slate); margin-top:10px; padding-top:10px; border-top:1px dashed var(--line);}
  .k-bar{height:5px; background:var(--line); border-radius:99px; margin-top:12px; overflow:hidden;}
  .k-bar-fill{height:100%; background:var(--teal-solid); border-radius:99px;}

  .toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:12px; flex-wrap:wrap;}
  .toolbar .count-label{font-size:13px; color:var(--slate); font-weight:600;}

  /* MODAL */
  .modal-backdrop{position:fixed; inset:0; background:rgba(3,31,66,.5); display:none; align-items:center; justify-content:center; z-index:100; padding:20px;}
  .modal-backdrop.open{display:flex;}
  .modal{background:#fff; border-radius:14px; width:100%; max-width:520px; max-height:88vh; overflow-y:auto; box-shadow:0 30px 70px -30px rgba(3,31,66,.5);}
  .modal-head{display:flex; justify-content:space-between; align-items:center; padding:20px 22px; border-bottom:1px solid var(--line);}
  .modal-head h3{font-size:22px; font-family:'Barlow Condensed'; font-weight:900; color:var(--navy-deep);}
  .modal-close{width:30px; height:30px; border-radius:8px; background:var(--paper); display:flex; align-items:center; justify-content:center; color:var(--slate);}
  .modal-body{padding:20px 22px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:11.5px; font-weight:700; color:var(--slate); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px;}
  .field input,.field select,.field textarea{width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px; outline:none; background:var(--paper);}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal); background:#fff;}
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .notes-list{max-height:140px; overflow-y:auto; margin-bottom:10px;}
  .note-item{font-size:12.5px; padding:8px 10px; background:var(--paper); border-radius:7px; margin-bottom:6px;}
  .note-item .note-date{font-size:10px; color:var(--slate); margin-top:3px;}
  .modal-foot{display:flex; justify-content:space-between; gap:10px; padding:16px 22px; border-top:1px solid var(--line);}
  .btn-primary{background:var(--navy); color:#fff; padding:10px 18px; border-radius:7px; font-size:13px; font-weight:700;}
  .btn-primary:hover{background:var(--navy-deep);}
  .btn-danger{background:#fbe9e9; color:var(--red-text); padding:10px 16px; border-radius:7px; font-size:13px; font-weight:700;}
  .btn-ghost{background:var(--paper); color:var(--ink); padding:10px 16px; border-radius:7px; font-size:13px; font-weight:700; border:1px solid var(--line);}

  .toast{position:fixed; bottom:24px; right:24px; background:var(--navy-deep); color:#fff; padding:12px 18px; border-radius:8px; font-size:13px; font-weight:600; box-shadow:0 10px 30px -10px rgba(0,0,0,.4); z-index:200; opacity:0; transform:translateY(8px); transition:opacity .2s,transform .2s; pointer-events:none;}
  .toast.show{opacity:1; transform:translateY(0);}

  .global-search-results{
    position:absolute; top:calc(100% + 8px); left:0; width:380px; max-height:420px; overflow-y:auto;
    background:var(--white); border:1px solid var(--line); border-radius:10px;
    box-shadow:0 20px 50px -20px rgba(3,31,66,.35); display:none; z-index:60;
  }
  .global-search-results.open{display:block;}
  .gsr-group{padding:8px 0;}
  .gsr-group-label{font-size:10.5px; text-transform:uppercase; letter-spacing:1px; color:var(--slate); font-weight:700; padding:6px 14px;}
  .gsr-item{display:flex; align-items:center; justify-content:space-between; padding:9px 14px; font-size:13px; cursor:pointer;}
  .gsr-item:hover{background:var(--paper);}
  .gsr-item .gsr-name{font-weight:700; color:var(--ink);}
  .gsr-item .gsr-sub{font-size:11px; color:var(--slate);}
  .gsr-empty{padding:20px 14px; text-align:center; color:var(--slate); font-size:12.5px;}

  /* KANBAN */
  .kanban{display:grid; grid-auto-flow:column; grid-auto-columns:240px; gap:14px; overflow-x:auto; padding-bottom:8px;}
  .kanban-col{background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:12px; min-height:200px;}
  .kanban-col.drag-over{background:var(--teal-soft); border-color:var(--teal);}
  .kanban-col-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding:0 2px;}
  .kanban-col-head .kc-name{font-size:12.5px; font-weight:700; color:var(--navy-deep);}
  .kanban-col-head .kc-count{font-family:'JetBrains Mono'; font-size:11px; color:var(--slate); background:var(--white); border:1px solid var(--line); padding:1px 7px; border-radius:99px;}
  .kanban-col-head .kc-total{font-size:10.5px; color:var(--slate); display:block; margin-top:2px;}
  .kanban-card{
    background:var(--white); border:1px solid var(--line); border-radius:9px; padding:11px 12px; margin-bottom:8px;
    cursor:grab; box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .kanban-card:active{cursor:grabbing;}
  .kanban-card.dragging{opacity:.4;}
  .kanban-card .kd-name{font-size:12.5px; font-weight:700; color:var(--ink); margin-bottom:3px;}
  .kanban-card .kd-contact{font-size:11px; color:var(--slate); margin-bottom:6px;}
  .kanban-card .kd-value{font-family:'JetBrains Mono'; font-size:12px; color:var(--teal-text); font-weight:600;}

  /* SAVED VIEWS */
  .view-chips{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; align-items:center;}
  .view-chip{
    font-size:12px; font-weight:600; padding:7px 13px; border-radius:99px; background:var(--white);
    border:1px solid var(--line); color:var(--slate); cursor:pointer; display:flex; align-items:center; gap:6px;
  }
  .view-chip.active{background:var(--navy); color:#fff; border-color:var(--navy);}
  .view-chip .vc-x{opacity:.6; display:inline-flex; align-items:center;}
  .view-chip .vc-x:hover{opacity:1;}
  .view-chip-save{
    font-size:12px; font-weight:700; padding:7px 13px; border-radius:99px; background:var(--teal-soft);
    border:1px dashed var(--teal); color:var(--teal-text); cursor:pointer;
  }
  .csv-actions{display:flex; gap:8px;}
  .btn-small{
    font-size:12px; font-weight:700; padding:8px 13px; border-radius:7px; background:var(--white);
    border:1px solid var(--line); color:var(--ink); cursor:pointer; display:flex; align-items:center; gap:6px;
  }
  .btn-small:hover{background:var(--paper);}
  .btn-small svg{width:13px; height:13px;}

  /* CONTACT LINKS + CALLS */
  .contact-links{display:flex; gap:10px; margin-bottom:16px;}
  .contact-link{display:flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700; padding:8px 13px; border-radius:7px; background:var(--paper); border:1px solid var(--line); color:var(--navy-deep);}
  .contact-link svg{width:13px; height:13px;}
  .contact-link:hover{background:var(--teal-soft); border-color:var(--teal); color:var(--teal-text);}
  .calls-mini{max-height:120px; overflow-y:auto; margin-bottom:8px;}
  .call-mini-item{font-size:12px; padding:8px 10px; background:var(--paper); border-radius:7px; margin-bottom:6px;}
  .call-mini-item .cm-date{font-size:10px; color:var(--slate); margin-top:2px;}
  .rec-controls{display:flex; align-items:center; gap:10px; margin-top:8px;}
  .rec-btn{display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:700; padding:9px 15px; border-radius:7px; background:var(--paper); border:1px solid var(--line); color:var(--ink);}
  .rec-btn.recording{background:#fbe9e9; border-color:var(--red); color:var(--red-text);}
  .rec-dot{width:8px; height:8px; border-radius:50%; background:var(--red); animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.3;}}
  .rec-hint{font-size:11px; color:var(--slate);}

  /* CUSTOM FIELDS */
  .cf-add-row{display:flex; gap:10px; align-items:flex-end; margin-bottom:20px; flex-wrap:wrap;}
  .cf-add-row .field{margin-bottom:0; flex:1; min-width:160px;}

  /* BULK ACTIONS */
  .bulk-bar{
    display:flex; align-items:center; gap:12px; background:var(--navy-deep); color:#fff;
    padding:12px 18px; border-radius:10px; margin-bottom:14px; flex-wrap:wrap;
  }
  .bulk-bar .bulk-count{font-size:12.5px; font-weight:700;}
  .bulk-bar select, .bulk-bar input[type=date]{padding:7px 10px; border-radius:6px; border:none; font-size:12px;}
  .bulk-bar button{font-size:12px; font-weight:700; padding:8px 13px; border-radius:6px;}
  .bulk-bar .bulk-apply{background:var(--teal-solid); color:#fff;}
  .bulk-bar .bulk-del{background:var(--red); color:#fff;}
  .bulk-bar .bulk-cancel{background:rgba(255,255,255,.15); color:#fff;}
  .row-check{width:16px; height:16px;}

  /* CALENDAR */
  .cal-toolbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px;}
  .cal-filters{display:flex; gap:6px;}
  .cal-filter{font-size:12px; font-weight:700; padding:8px 14px; border-radius:99px; background:var(--white); border:1px solid var(--line); color:var(--slate); cursor:pointer;}
  .cal-filter.active{background:var(--navy); color:#fff; border-color:var(--navy);}
  .cal-nav{display:flex; align-items:center; gap:10px;}
  .cal-nav button{width:32px; height:32px; border-radius:7px; background:var(--white); border:1px solid var(--line); color:var(--slate); cursor:pointer;}
  .cal-nav .cal-month-label{font-family:'Barlow Condensed'; font-weight:900; font-size:20px; color:var(--navy-deep); min-width:150px; text-align:center;}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--line); border:1px solid var(--line); border-radius:12px; overflow:hidden;}
  .cal-weekday{background:var(--paper); padding:8px; text-align:center; font-size:10.5px; font-weight:700; color:var(--slate); text-transform:uppercase;}
  .cal-cell{background:var(--white); min-height:96px; padding:6px; cursor:pointer; display:flex; flex-direction:column; gap:3px;}
  .cal-cell:hover{background:var(--teal-soft);}
  .cal-cell.other-month{background:var(--paper); opacity:.5;}
  .cal-cell.today .cal-daynum{background:var(--teal-solid); color:#fff; border-radius:50%;}
  .cal-daynum{font-size:11px; font-weight:700; color:var(--ink); width:20px; height:20px; display:flex; align-items:center; justify-content:center;}
  .cal-pill{font-size:9.5px; font-weight:700; padding:2px 6px; border-radius:5px; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .cal-more{font-size:9.5px; color:var(--slate); font-weight:600;}
  .cal-att-list{display:flex; flex-wrap:wrap; gap:8px; margin-top:8px;}
  .cal-att-chip{display:flex; align-items:center; gap:6px; padding:5px 10px; border-radius:99px; border:1px solid var(--line); font-size:12px; font-weight:600; cursor:pointer;}
  .cal-att-chip.active{background:var(--teal-soft); border-color:var(--teal); color:var(--teal-text);}

  /* CONTENT FEED (internal, LinkedIn-style) */
  .feed-toggle{display:flex; gap:6px; margin-bottom:16px;}
  .feed-toggle span{font-size:12.5px; font-weight:700; padding:8px 16px; border-radius:99px; background:var(--white); border:1px solid var(--line); color:var(--slate); cursor:pointer;}
  .feed-toggle span.active{background:var(--navy); color:#fff; border-color:var(--navy);}
  .feed-card{background:var(--white); border:1px solid var(--line); border-radius:14px; padding:18px 20px; margin-bottom:16px;}
  .feed-head{display:flex; align-items:center; gap:12px; margin-bottom:12px;}
  .feed-avatar{width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:14px; flex-shrink:0;}
  .feed-who{font-size:13.5px; font-weight:700; color:var(--ink);}
  .feed-meta{font-size:11.5px; color:var(--slate); display:flex; align-items:center; gap:6px; margin-top:1px;}
  .feed-type-pill{font-size:10px; font-weight:700; padding:2px 9px; border-radius:99px; color:#fff;}
  .feed-title{font-size:17px; font-weight:700; color:var(--ink); margin-bottom:6px; cursor:pointer;}
  .feed-title:hover{color:var(--teal-text);}
  .feed-desc{font-size:13.5px; color:var(--ink); line-height:1.5; margin-bottom:8px;}
  .feed-caption{font-size:13px; color:var(--slate); font-style:italic; border-left:3px solid var(--line); padding-left:10px; margin-bottom:10px;}
  .feed-media{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; color:var(--teal-text); background:var(--teal-soft); padding:7px 12px; border-radius:8px; margin-bottom:12px;}
  .feed-actions{display:flex; align-items:center; gap:18px; padding-top:10px; border-top:1px solid var(--line);}
  .feed-action-btn{display:flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700; color:var(--slate); cursor:pointer; background:none; border:none;}
  .feed-action-btn:hover{color:var(--teal-text);}
  .feed-action-btn.liked{color:var(--teal-text);}
  .feed-action-btn svg{width:16px; height:16px;}
  .feed-comments{margin-top:12px; padding-top:12px; border-top:1px solid var(--line);}
  .feed-comment{display:flex; gap:9px; margin-bottom:10px;}
  .feed-comment .fc-avatar{width:26px; height:26px; border-radius:50%; background:var(--paper); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:var(--navy-deep); flex-shrink:0;}
  .feed-comment .fc-body{background:var(--paper); border-radius:10px; padding:8px 12px; flex:1;}
  .feed-comment .fc-name{font-size:12px; font-weight:700; color:var(--ink);}
  .feed-comment .fc-text{font-size:12.5px; color:var(--ink); margin-top:1px;}
  .feed-comment-input{display:flex; gap:8px; margin-top:10px;}
  .feed-comment-input input{flex:1; padding:9px 12px; border:1px solid var(--line); border-radius:99px; font-size:12.5px; background:var(--paper);}
  .feed-comment-input button{background:var(--navy); color:#fff; border:none; padding:9px 16px; border-radius:99px; font-size:12px; font-weight:700; cursor:pointer;}
  .feed-empty{text-align:center; padding:50px 20px; color:var(--slate); font-size:13px;}

  /* REPORTS */
  /* SETTINGS */
  .settings-tabs{display:flex; gap:6px; margin-bottom:18px; border-bottom:1px solid var(--line); padding-bottom:0; flex-wrap:wrap;}
  .settings-tab{font-size:12.5px; font-weight:700; padding:9px 14px; color:var(--slate); border-bottom:2px solid transparent; cursor:pointer;}
  .settings-tab.active{color:var(--navy-deep); border-bottom-color:var(--teal);}
  .theme-options{display:flex; gap:10px; margin-bottom:16px;}
  .theme-opt{flex:1; border:1.5px solid var(--line); border-radius:10px; padding:14px; text-align:center; cursor:pointer; font-size:12.5px; font-weight:700; color:var(--ink);}
  .theme-opt.active{border-color:var(--teal); background:var(--teal-soft); color:var(--teal-text);}
  .swatches{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;}
  .swatch{width:28px; height:28px; border-radius:50%; cursor:pointer; border:2px solid transparent;}
  .swatch.active{border-color:var(--ink);}
  .role-user-row{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--line);}
  .role-user-row:last-child{border-bottom:none;}
  .role-user-row .ru-name{font-size:13px; font-weight:700; color:var(--ink);}
  .role-user-row .ru-sub{font-size:11.5px; color:var(--slate); margin-top:2px;}

  .report-card{background:var(--white); border:1px solid var(--line); border-radius:12px; padding:22px; margin-bottom:16px;}
  .report-card h3{font-size:19px; font-family:'DM Sans'; font-weight:700; color:var(--ink); margin-bottom:16px;}
  .bar-row{display:flex; align-items:center; gap:12px; margin-bottom:10px;}
  .bar-label{width:120px; font-size:12px; color:var(--slate); flex-shrink:0;}
  .bar-track{flex:1; height:22px; background:var(--paper); border-radius:5px; overflow:hidden; position:relative;}
  .bar-fill{height:100%; background:var(--teal-solid); border-radius:5px; display:flex; align-items:center; justify-content:flex-end; padding-right:8px;}
  .bar-fill span{font-size:10.5px; color:#fff; font-weight:700; font-family:'JetBrains Mono';}
  .bar-fill.navy{background:var(--navy);}
  .bar-fill.amber{background:var(--amber);}

  @media (max-width:1180px){.stat-row{grid-template-columns:repeat(2,1fr);} .kpi-grid{grid-template-columns:repeat(2,1fr);} .grid-2{grid-template-columns:1fr;}}

  /* ORG CHART */
  .org-tree, .org-tree ul{list-style:none; display:flex; padding-top:20px; position:relative; justify-content:center;}
  .org-tree ul{padding-top:20px;}
  .org-tree li{display:flex; flex-direction:column; align-items:center; position:relative; padding:20px 10px 0;}
  .org-tree li::before, .org-tree li::after{content:''; position:absolute; top:0; right:50%; border-top:2px solid var(--line); width:50%; height:20px;}
  .org-tree li::after{right:auto; left:50%; border-left:2px solid var(--line);}
  .org-tree li:only-child::after, .org-tree li:only-child::before{display:none;}
  .org-tree li:only-child{padding-top:0;}
  .org-tree li:first-child::before{border:0 none;}
  .org-tree li:last-child::after{border:0 none;}
  .org-tree li:last-child::before{border-right:2px solid var(--line); border-radius:0 8px 0 0;}
  .org-tree li:first-child::after{border-radius:8px 0 0 0;}
  .org-tree > li{padding-top:0;}
  .org-tree > li::before, .org-tree > li::after{display:none;}
  .org-card{display:inline-flex; flex-direction:column; align-items:center; gap:6px; background:var(--white); border:1px solid var(--line); border-radius:10px; padding:12px 16px; min-width:140px; box-shadow:0 2px 6px rgba(0,0,0,.04); position:relative;}
  .org-card .org-avatar{width:40px; height:40px; border-radius:50%; overflow:hidden; background:var(--teal-solid); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:14px;}
  .org-card .org-name{font-size:13px; font-weight:700; color:var(--ink); white-space:nowrap;}
  .org-card .org-role{font-size:11px; color:var(--slate); white-space:nowrap;}
  .org-unassigned{display:flex; flex-wrap:wrap; gap:12px; margin-top:16px;}

  /* MOBILE NAV DRAWER */
  .mobile-menu-btn{display:none;}
  .mobile-close-btn{display:none; background:rgba(255,255,255,.1); border:none; color:#fff; width:30px; height:30px; border-radius:7px; align-items:center; justify-content:center; margin-left:auto; flex-shrink:0;}
  .sidebar-backdrop{display:none; position:fixed; inset:0; background:rgba(3,31,66,.55); z-index:150;}
  .sidebar-backdrop.open{display:block;}

  /* TABLET */
  @media (max-width:1024px){
    .sidebar{width:200px; min-width:200px;}
    .stat-row{grid-template-columns:repeat(2,1fr);}
    .kpi-grid{grid-template-columns:repeat(2,1fr);}
    .grid-2{grid-template-columns:1fr;}
    .content{padding:22px 20px 50px;}
    .field-row{grid-template-columns:1fr 1fr;}
  }

  /* PHONE — sidebar becomes an off-canvas drawer */
  @media (max-width:760px){
    body{display:block;}
    .sidebar{
      position:fixed; top:0; left:0; width:78vw; max-width:300px; min-width:0; height:100vh;
      z-index:200; transform:translateX(-100%); transition:transform .25s ease; box-shadow:0 0 40px rgba(0,0,0,.3);
    }
    .sidebar.open{transform:translateX(0);}
    .mobile-menu-btn{display:flex;}
    .mobile-close-btn{display:flex;}
    main{width:100%;}
    .topbar{padding:12px 16px; gap:10px;}
    .search{width:auto; flex:1; min-width:0;}
    .search input{width:100%;}
    .global-search-results{width:calc(100vw - 32px); left:-46px;}
    .top-actions{gap:8px;}
    .btn-new span{display:none;}
    .btn-new{padding:10px;}
    .content{padding:16px 14px 40px;}
    .page-head{flex-direction:column; align-items:flex-start; gap:10px;}
    .page-head h1{font-size:26px;}
    .stat-row{grid-template-columns:1fr 1fr; gap:10px;}
    .stat-card{padding:14px;}
    .kpi-grid{grid-template-columns:1fr 1fr; gap:10px;}
    .field-row{grid-template-columns:1fr;}
    .grid-2{grid-template-columns:1fr;}
    .csv-actions{flex-wrap:wrap;}
    .panel{overflow-x:auto; -webkit-overflow-scrolling:touch;}
    .panel table{min-width:620px;}
    .cal-grid{overflow-x:auto; -webkit-overflow-scrolling:touch; grid-auto-flow:column; grid-auto-columns:13vw; min-width:700px;}
    .kanban{padding-bottom:12px;}
    .settings-tabs{overflow-x:auto; -webkit-overflow-scrolling:touch; flex-wrap:nowrap;}
    .settings-tab{white-space:nowrap;}
    .modal-backdrop{padding:0; align-items:flex-end;}
    .modal{max-width:100%; width:100%; max-height:92vh; border-radius:16px 16px 0 0;}
    .role-user-row{flex-wrap:wrap; gap:8px;}
    .compare-grid{grid-template-columns:1fr;}
    .feed-card{padding:14px 16px;}
    .theme-options{flex-direction:column;}
  }

  @media (max-width:420px){
    .stat-row{grid-template-columns:1fr;}
    .kpi-grid{grid-template-columns:1fr;}
    .search input::placeholder{font-size:12px;}
  }

  /* SESSION LOCK */
  .lock-overlay{position:fixed; inset:0; background:linear-gradient(160deg,var(--navy-black),var(--navy-deep)); display:none; align-items:center; justify-content:center; z-index:500; text-align:center;}
  .lock-overlay.open{display:flex;}
  .lock-card{max-width:320px; padding:20px;}

  /* ONBOARDING CHECKLIST */
  .onboard-banner{background:var(--white); border:1px solid var(--line); border-left:4px solid var(--teal); border-radius:14px; padding:20px 22px; margin-bottom:22px; color:var(--ink); position:relative;}
  .onboard-banner .ob-close{position:absolute; top:14px; right:16px; background:var(--paper); border:1px solid var(--line); color:var(--slate); width:24px; height:24px; border-radius:6px; cursor:pointer; display:flex; align-items:center; justify-content:center;}
  .onboard-banner h3{font-size:22px; margin-bottom:4px; color:var(--navy-deep);}
  .onboard-banner p{font-size:12.5px; color:var(--slate); margin-bottom:14px;}
  .ob-steps{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px;}
  .ob-step{background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:12px; cursor:pointer; display:flex; align-items:flex-start; gap:9px;}
  .ob-step.done{background:var(--teal-soft); border-color:var(--teal);}
  .ob-step .ob-check{width:18px; height:18px; border-radius:5px; border:1.5px solid var(--line); flex-shrink:0; display:flex; align-items:center; justify-content:center; margin-top:1px; background:var(--white);}
  .ob-step.done .ob-check{background:var(--green); border-color:var(--green);}
  .ob-step .ob-check svg{width:11px; height:11px; color:#fff;}
  .ob-step .ob-label{font-size:12.5px; font-weight:700; color:var(--ink);}
  .ob-step .ob-sub{font-size:10.5px; color:var(--slate); margin-top:2px;}
</style>
</head>

/* ===================== STORAGE COMPATIBILITY ===================== */
// window.storage only exists inside Claude.ai's artifact preview. Opened as a plain file
// (downloaded, hosted, or on a phone browser), it doesn't exist, so every save/load would
// throw and the app would never finish loading. This polyfill makes it work standalone too,
// backed by localStorage, so it's the same app whether viewed in Claude.ai or on your phone.
// Note: this local data is separate per browser/device until a real shared backend exists.
if(!window.storage){
  const LS_PREFIX = 'favze_crm_';
  window.storage = {
    async get(key){
      try{
        const raw = localStorage.getItem(LS_PREFIX+key);
        if(raw===null) return null;
        return { key, value: raw, shared:false };
      }catch(e){ return null; }
    },
    async set(key, value){
      try{
        localStorage.setItem(LS_PREFIX+key, value);
        return { key, value, shared:false };
      }catch(e){ console.error('localStorage set failed', e); return null; }
    },
    async delete(key){
      try{
        localStorage.removeItem(LS_PREFIX+key);
        return { key, deleted:true, shared:false };
      }catch(e){ return null; }
    },
    async list(prefix){
      try{
        const keys = Object.keys(localStorage)
          .filter(k=>k.startsWith(LS_PREFIX+(prefix||'')))
          .map(k=>k.slice(LS_PREFIX.length));
        return { keys, prefix, shared:false };
      }catch(e){ return null; }
    }
  };
}

/* ===================== DATA LAYER (no AI, pure storage + math) ===================== */
const STORAGE_KEY = 'favze-crm-contacts';
let DATA = { contacts: [] };
let currentView = 'dashboard';
let editingId = null;
let searchTerm = '';
let selectedContactIds = new Set();
let tagFilter = null;
let listViewFilter = null;
let ownerFilter = null;
let serviceFilter = null;
let cfFilterField = '';
let cfFilterValue = '';

function uid(){ return 'c_' + Math.random().toString(36).slice(2,9); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function daysBetween(a,b){ return Math.round((new Date(b) - new Date(a)) / 86400000); }
function fmtDate(iso){
  if(!iso) return '—';
  const d = new Date(iso+'T00:00:00');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const yyyy = d.getFullYear();
  const fmt = (DATA.settings && DATA.settings.dateFormat) || 'MDY';
  if(fmt==='DMY') return `${dd}/${mm}/${yyyy}`;
  if(fmt==='YMD') return `${yyyy}-${mm}-${dd}`;
  return `${mm}/${dd}/${yyyy}`;
}
function fmtMoney(n){
  const sym = (DATA.settings && DATA.settings.currencySymbol) || '$';
  const locale = (DATA.settings && DATA.settings.numberFormat==='period') ? 'de-DE' : 'en-US';
  return sym + Number(n||0).toLocaleString(locale);
}
function currentScope(){
  const user = DATA.users.find(u=>u.id===DATA.profile.activeUserId);
  const role = user ? DATA.roles.find(r=>r.id===user.roleId) : null;

function hexToRgbArr(hex){
  hex = hex.replace('#','');
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  const num = parseInt(hex,16);
  return [(num>>16)&255, (num>>8)&255, num&255];
}
function relLuminance([r,g,b]){
  const a = [r,g,b].map(v=>{ v/=255; return v<=0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4); });
  return 0.2126*a[0] + 0.7152*a[1] + 0.0722*a[2];
}
function contrastRatio(hex1, hex2){
  const l1 = relLuminance(hexToRgbArr(hex1)), l2 = relLuminance(hexToRgbArr(hex2));
  const lighter = Math.max(l1,l2), darker = Math.min(l1,l2);
  return (lighter+0.05)/(darker+0.05);
}
// Given any accent color, returns a shade of it that reads at WCAG AA (4.5:1) as text,
// against both white and light backgrounds in light mode, or against dark backgrounds
// in dark mode. This is what makes the accent color picker safe even for custom colors.
function accessibleTextShade(hex, isDark){
  let [r,g,b] = hexToRgbArr(hex);
  const bg = isDark ? '#0B121C' : '#FFFFFF';
  for(let i=0;i<60;i++){
    const cur = '#' + [r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
    if(contrastRatio(cur, bg) >= 4.5) return cur;
    if(isDark){ r=r+(255-r)*0.08; g=g+(255-g)*0.08; b=b+(255-b)*0.08; }
    else{ r*=0.94; g*=0.94; b*=0.94; }
  }
  return isDark ? '#FFFFFF' : '#000000';
}
function rgbArrToHex([r,g,b]){
  return '#' + [r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
}
// For any arbitrary color (tags, time-off types, content types) used as a solid
// background with white text on top, darkens it just enough that the white text
// stays readable at WCAG AA, regardless of what color was originally picked.
function safeBgForWhiteText(hex){
  let [r,g,b] = hexToRgbArr(hex);
  for(let i=0;i<60;i++){
    const cur = rgbArrToHex([r,g,b]);
    if(contrastRatio('#FFFFFF', cur) >= 4.5) return cur;
    r*=0.94; g*=0.94; b*=0.94;
  }
  return '#000000';
}

/* ===================== IMAGE UPLOAD COMPRESSION ===================== */
// Every photo (logo, profile, team avatars) lives inside the same single storage key
// alongside all other data, which has a hard 5MB ceiling. Rather than just rejecting
// anything over ~2MB, resize + recompress on upload so stored images stay small
// (usually under 100-200KB) no matter what size photo someone picks.
const MAX_UPLOAD_SOURCE_BYTES = 10 * 1024 * 1024; // 10MB — sanity guard before we even try to process it
function compressImageFile(file, maxDim, quality){
  maxDim = maxDim || 400;
  quality = quality || 0.82;
  return new Promise((resolve, reject)=>{
    if(file.size > MAX_UPLOAD_SOURCE_BYTES){ reject(new Error('That file is too large, try a smaller image (under 10MB).')); return; }
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w>=h){ if(w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; } }
        else{ if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; } }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = ()=> reject(new Error('Could not read that image'));
      img.src = e.target.result;
    };
    reader.onerror = ()=> reject(new Error('Could not read that file'));
    reader.readAsDataURL(file);
  });
}

async function handleLogoUpload(input){

async function saveData(){
  const payload = JSON.stringify(DATA);
  try{
    const result = await window.storage.set(STORAGE_KEY, payload, false);
    if(!result){ throw new Error('empty response'); }
    // Save succeeded for real — clear any stale local backup so we don't confuse ourselves later.
    try{ localStorage.removeItem(STORAGE_KEY + '_backup'); }catch(e){}
  }catch(err){
    console.error('Storage error', err);
    // The real save failed (platform-side issue, oversized payload, or a transient error).
    // Don't let that silently lose changes — keep a local backup so nothing's gone even
    // if this particular save didn't make it to real storage.
    let backedUp = false;
    try{ localStorage.setItem(STORAGE_KEY + '_backup', payload); backedUp = true; }catch(e){}
    showToast(backedUp
      ? 'Save failed, changes backed up locally. Try again or refresh once the issue clears.'
      : 'Save failed. Changes may not persist.');
  }
}

/* ===================== CALCULATIONS (pure math, no AI) ===================== */
function calc(){
  const c = scopedContacts(DATA.contacts);
  const deals = scopedDeals(DATA.deals);
  const prospects = c.filter(x=>x.type==='prospect');
  const leads = c.filter(x=>x.type==='lead');
  const customers = c.filter(x=>x.type==='customer');
  const pastCustomers = c.filter(x=>x.type==='past_customer');

  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
  const revenueThisMonth = deals
    .filter(d=>isWonStage(d.stage) && d.wonDate && d.wonDate >= monthStart)
    .reduce((s,d)=>s+Number(d.value||0),0);

  const newLeadsThisWeek = leads.filter(x=> daysBetween(x.dateAdded, todayISO()) <= 7).length;

  const followUpsDue = c.filter(x=> x.followUpDate && !x.followUpDone && x.followUpDate <= todayISO()).length;

  const activeCustomers = customers.length;

  const everBecameLead = leads.length + customers.length + pastCustomers.length;
  const leadToCustomerRate = everBecameLead > 0 ? ((customers.length+pastCustomers.length)/everBecameLead*100) : 0;

  const withResponse = c.filter(x=>x.responseHours!=null && x.responseHours!=='');
  const avgResponseTime = withResponse.length ? (withResponse.reduce((s,x)=>s+Number(x.responseHours),0)/withResponse.length) : 0;

  const withFollowUp = c.filter(x=>x.followUpDate);
  const onTime = withFollowUp.filter(x=>x.followUpDone).length;
  const followUpsOnTimeRate = withFollowUp.length ? (onTime/withFollowUp.length*100) : 0;

  const activePipelineValue = deals.filter(d=>isOpenStage(d.stage)).reduce((s,d)=>s+Number(d.value||0),0);

  return {prospects,leads,customers,pastCustomers,revenueThisMonth,newLeadsThisWeek,followUpsDue,activeCustomers,leadToCustomerRate,avgResponseTime,followUpsOnTimeRate,activePipelineValue};
}

  } else if(currentView === 'calendar'){
    content.innerHTML = renderCalendarView();
  } else if(currentView === 'contentcal'){
    content.innerHTML = renderContentCalendarView();
  } else if(currentView === 'crossposter'){
    content.innerHTML = renderCrossPosterView();
  } else if(currentView === 'reports'){
    content.innerHTML = renderReportsView();
  } else if(currentView === 'timesheets'){
    content.innerHTML = renderTimesheetsView();
  } else if(currentView === 'customfields'){
    content.innerHTML = renderCustomFieldsView();
  } else if(currentView === 'settings'){
    content.innerHTML = renderSettingsPage();
  } else {

}

function renderTaskOrReminderItems(list, kind){
  const open = [...list].filter(x=>!x.done).sort((a,b)=> (a.dueDate||'9999').localeCompare(b.dueDate||'9999')).slice(0,6);
  if(!open.length) return `<div class="fu-item"><div class="fu-body"><div class="fu-name">Nothing open</div></div></div>`;
  return open.map(x=>{
    const isOverdue = x.dueDate && x.dueDate < todayISO();
    const isToday = x.dueDate === todayISO();
    const cls = isOverdue ? 'overdue' : (isToday ? 'today' : 'soon');
    const dueLabel = !x.dueDate ? 'No date' : (isOverdue ? `${Math.abs(daysBetween(todayISO(),x.dueDate))}d late` : (isToday ? 'Today' : fmtDate(x.dueDate)));
    const title = kind==='task' ? x.title : x.text;
    return `
      <div class="fu-item">
        <div class="fu-check ${isOverdue?'overdue':''}" onclick="toggleDone(event,'${kind}','${x.id}')">${x.done?iconCheck():''}</div>
        <div class="fu-body" onclick="${kind==='task'?`openEditTask('${x.id}')`:`openEditReminder('${x.id}')`}">
          <div class="fu-name">${esc(title)}</div>
          <div class="fu-note">${kind==='task' && x.priority ? esc(x.priority)+' priority' : ''}${kind==='task' && x.project ? ' · '+esc(x.project) : ''}</div>
        </div>
        <div class="fu-due ${cls}">${dueLabel}</div>
      </div>`;
  }).join('');
}

async function toggleDone(e, kind, id){
  e.stopPropagation();
  const list = kind==='task' ? DATA.tasks : DATA.reminders;
  const item = list.find(x=>x.id===id);
  if(!item) return;
  item.done = !item.done;
  await saveData();
  render();
  showToast(item.done ? 'Marked done' : 'Reopened');
}

/* ===================== AUTOMATION ENGINE (no AI — rule matching only) ===================== */
function getMergeRawValue(tagRaw, contact){
  const tag = tagRaw.trim().toLowerCase();
  if(tag==='name') return contact.name||'';
  if(tag==='company') return contact.company||'';
  if(tag==='stage') return contact.stage||'';
  if(tag==='source') return contact.source||'';
  if(tag==='phone') return contact.phone||'';
  if(tag==='email') return contact.email||'';
  if(tag==='type') return typeLabel(contact.type);
  if(tag==='dealvalue') return contact.dealValue ? fmtMoney(contact.dealValue) : '';
  if(tag==='followupdate') return contact.followUpDate ? fmtDate(contact.followUpDate) : '';
  if(tag.startsWith('field.')){
    const fname = tagRaw.trim().slice(6).trim().toLowerCase();
    const f = DATA.customFields.find(cf=>cf.name.toLowerCase()===fname);
    if(f && contact.customFields) return contact.customFields[f.id] || '';
    return '';
  }
  return '';
}
function getMergeValue(tagRaw, contact){
  const val = getMergeRawValue(tagRaw, contact);
  if(val) return val;
  const fallbacks = DATA.settings.mergeFallbacks || {};
  return fallbacks[tagRaw.trim().toLowerCase()] || '';
}
function fillTemplate(str, contact){
  let out = str||'';
  for(let i=0;i<20;i++){
    const re = /\{\{#if\s+([\w.]+)\}\}([\s\S]*?)(?:\{\{#else\}\}([\s\S]*?))?\{\{\/if\}\}/i;
    if(!re.test(out)) break;
    out = out.replace(re, (m, tag, truthyContent, falsyContent)=>{
      const val = getMergeRawValue(tag, contact);
      return val ? truthyContent : (falsyContent||'');
    });
  }
  out = out.replace(/\{\{\s*([\w.]+)\s*\}\}/g, (m, tag)=> getMergeValue(tag, contact));
  return out;
}

  {key:'lead_assigned', label:'New Lead Assigned'},

function isQuietNow(){
  if(DATA.settings.snoozeUntil && new Date(DATA.settings.snoozeUntil) > new Date()) return true;
  const q = DATA.settings.quietHours;
  if(!q || !q.enabled) return false;
  const now = new Date();
  const dayKeys = ['sun','mon','tue','wed','thu','fri','sat'];
  if(!q.days[dayKeys[now.getDay()]]) return false;
  const [sh,sm] = q.start.split(':').map(Number);
  const [eh,em] = q.end.split(':').map(Number);
  const startMin = sh*60+sm, endMin = eh*60+em;
  const curMin = now.getHours()*60+now.getMinutes();
  if(startMin===endMin) return false;
  return startMin < endMin ? (curMin>=startMin && curMin<endMin) : (curMin>=startMin || curMin<endMin);
}
async function notifyEvent(eventKey, message, contact){
  const cfg = (DATA.settings.alertChannels && DATA.settings.alertChannels[eventKey]) || {inApp:true, email:false, sms:false};
  const now = new Date().toISOString();
  const quiet = isQuietNow();
  if(cfg.inApp){
    DATA.notifications.unshift({ id: uid(), eventKey, message, contactName: contact?contact.name:'', at: now, read:false, muted: quiet });
    updateNotifBadge();
    if(!quiet) showToast(message);
  }
  if(cfg.sms){
    DATA.smsLog.unshift({ id: uid(), eventKey, message, contactName: contact?contact.name:'', at: now });
  }
  if(cfg.email){
    if(DATA.settings.digestMode){
      DATA.digestQueue.push({ id: uid(), eventKey, message, contactName: contact?contact.name:'', at: now });
    } else {
      DATA.emailLog.unshift({
        id: uid(), workflowId:null, workflowName: 'Alert: ' + eventLabel(eventKey),
        contactId: contact?contact.id:null, contactName: contact?contact.name:'System',
        subject: eventLabel(eventKey), body: message, triggeredAt: now
      });
    }
  }
  await saveData();
}

    if(match) fireWorkflow(w, contact);
  });
}

function lastActivityDate(contact){
  const dates = [contact.dateAdded];
  (contact.notes||[]).forEach(n=> dates.push(n.date));
  DATA.emailLog.filter(l=>l.contactId===contact.id).forEach(l=> dates.push(l.triggeredAt.slice(0,10)));
  DATA.callLogs.filter(cl=>cl.contactId===contact.id).forEach(cl=> dates.push(cl.date));
  if(contact.followUpDone && contact.followUpDate) dates.push(contact.followUpDate);
  return dates.filter(Boolean).sort().slice(-1)[0] || contact.dateAdded;
}
// Scans every date-type custom field flagged for automated reminders. For any contact
// with that field filled in, creates one real Reminder on the configured lead day,
// linked back to that contact. Runs once per day per contact/field pair, tracked via
// a small marker on the contact so it never duplicates.
function checkCustomDateReminders(){
  const dateFields = DATA.customFields.filter(f=>f.type==='date' && f.reminderEnabled);
  if(!dateFields.length) return;
  let changed = false;
  const today = todayISO();
  DATA.contacts.forEach(c=>{
    if(!c.customFields) return;
    dateFields.forEach(f=>{
      if(!f.appliesTo || (!f.appliesTo.includes('all') && !f.appliesTo.includes(c.type))) return;
      const dateVal = c.customFields[f.id];
      if(!dateVal) return;
      const leadDays = f.reminderDaysBefore || 0;
      const remindOn = shiftDateFrom(dateVal, -leadDays);
      if(remindOn !== today) return;
      c._customDateReminded = c._customDateReminded || {};
      const markerKey = f.id + ':' + dateVal;
      if(c._customDateReminded[markerKey]) return; // already created, don't duplicate
      DATA.reminders.push({
        id: uid(), dateAdded: today, done:false, contactId: c.id,
        text: `${c.name} — ${f.name}${leadDays>0?` in ${leadDays} day${leadDays===1?'':'s'}`:' is today'} (${fmtDate(dateVal)})`,
        dueDate: today,
      });
      c._customDateReminded[markerKey] = true;
      changed = true;
    });
  });
  if(changed) saveData();
}
function shiftDateFrom(dateStr, days){
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10);
}

function checkStageDemotions(){
  const sd = DATA.settings.stageDemotion;
  if(!sd || !sd.enabled) return;
  let changed = false;
  DATA.contacts.forEach(c=>{
    if(c.type!=='lead') return;
    const last = lastActivityDate(c);
    if(daysBetween(last, todayISO()) >= sd.inactivityDays){
      c.type = 'prospect';
      c.stage = 'Demoted (inactive)';
      c.notes = (c.notes||[]).concat([{ text: `Auto-demoted from Lead to Prospect after ${sd.inactivityDays}+ days with no CRM activity (last activity: ${fmtDate(last)}).`, date: todayISO() }]);
      changed = true;
    }
  });
  if(changed) saveData();
}

function checkTaskEscalation(){
  if(!DATA.settings.taskEscalationEnabled) return;
  let changed = false;
  DATA.tasks.forEach(t=>{
    if(t.done || t.escalated || !t.dueDate || !t.assignedTo) return;
    if(daysBetween(t.dueDate, todayISO()) < 2) return;
    const owner = DATA.users.find(u=>u.id===t.assignedTo);
    if(!owner || !owner.managerId) return;
    const manager = DATA.users.find(u=>u.id===owner.managerId);
    if(!manager) return;
    t.assignedTo = manager.id;
    t.escalated = true;
    changed = true;
    notifyEvent('task_escalated', `"${t.title}" was overdue 48h+ and reassigned from ${owner.name} to ${manager.name}`, null);
  });
  if(changed) saveData();
}

function checkOverdueTriggers(){
  const workflows = DATA.workflows.filter(w=>w.active && w.trigger.type==='overdue');
  let changed = false;
  DATA.contacts.forEach(c=>{
    if(c.followUpDate && !c.followUpDone && c.followUpDate < todayISO()){
      c.triggeredWorkflowIds = c.triggeredWorkflowIds || [];
      workflows.forEach(w=>{
        if(!c.triggeredWorkflowIds.includes(w.id)){
          fireWorkflow(w, c);
          c.triggeredWorkflowIds.push(w.id);
          changed = true;
        }
      });
      if(!c._overdueAlerted){
        notifyEvent('followup_overdue', `Follow up with ${c.name} is overdue`, c);
        c._overdueAlerted = true;
        changed = true;
      }
    } else if(c.followUpDone){
      if(c.triggeredWorkflowIds && c.triggeredWorkflowIds.length){ c.triggeredWorkflowIds = []; changed = true; }
      if(c._overdueAlerted){ c._overdueAlerted = false; changed = true; }
    }
  });
  if(changed) saveData();
}

async function sendCampaign(id){
  let cm = DATA.campaigns.find(x=>x.id===id);
  // if opened as a brand-new unsaved campaign, save it first
  if(!cm){
    const name = document.getElementById('cm_name').value.trim();
    if(!name){ showToast('Campaign name is required'); return; }
    cm = { id: uid(), dateAdded: todayISO(), status:'draft', recipientCount:0, sentAt:null,
      name, audienceType: document.getElementById('cm_audience').value, tagFilter: document.getElementById('cm_tag').value || null,
      listFilter: document.getElementById('cm_list').value || null,
      subject: document.getElementById('cm_subject').value.trim(), body: document.getElementById('cm_body').value.trim() };
    DATA.campaigns.push(cm);
  } else if(document.getElementById('cm_name')){
    // pull latest edits from the open form before sending
    cm.name = document.getElementById('cm_name').value.trim() || cm.name;
    cm.audienceType = document.getElementById('cm_audience').value;
    cm.tagFilter = document.getElementById('cm_tag').value || null;
    cm.listFilter = document.getElementById('cm_list').value || null;
    cm.subject = document.getElementById('cm_subject').value.trim();
    cm.body = document.getElementById('cm_body').value.trim();
  }
  if(!cm.subject){ showToast('Add a subject line before sending'); return; }
  const recipients = audienceContacts(cm.audienceType, cm.tagFilter, cm.listFilter);
  if(!recipients.length){ showToast('No eligible recipients for this audience'); return; }
  recipients.forEach(contact=>{
    DATA.emailLog.unshift({
      id: uid(), workflowId: null, workflowName: `Campaign: ${cm.name}`, campaignId: cm.id,
      contactId: contact.id, contactName: contact.name,
      subject: fillTemplate(cm.subject, contact),
      body: fillTemplate(cm.body, contact),
      triggeredAt: new Date().toISOString()
    });
  });
  cm.status = 'sent';
  cm.recipientCount = recipients.length;

function daysUntilAnnual(dateStr){
  if(!dateStr) return null;
  const today = new Date(todayISO()+'T00:00:00');
  const [,, mm, dd] = dateStr.match(/(\d{4})-(\d{2})-(\d{2})/) || [];
  if(!mm) return null;
  let next = new Date(today.getFullYear()+'-'+mm+'-'+dd+'T00:00:00');
  if(next < today){ next = new Date((today.getFullYear()+1)+'-'+mm+'-'+dd+'T00:00:00'); }
  return Math.round((next - today) / 86400000);
}
function yearsSince(dateStr){
  if(!dateStr) return null;
  const start = new Date(dateStr+'T00:00:00');
  const today = new Date(todayISO()+'T00:00:00');
  let years = today.getFullYear() - start.getFullYear();
  const hadAnniversaryYet = (today.getMonth() > start.getMonth()) || (today.getMonth()===start.getMonth() && today.getDate()>=start.getDate());
  if(!hadAnniversaryYet) years--;
  return years;
}

async function saveIncidentForm(){
  const fileDate = document.getElementById('inc_fileDate').value || todayISO();
  const payload = {
    fileDate,
    type: document.getElementById('inc_type').value,
    involvedUserId: document.getElementById('inc_involvedUserId').value || null,
    involvedOther: document.getElementById('inc_involvedOther').value.trim(),
    description: document.getElementById('inc_description').value.trim(),
    investigationStatus: document.getElementById('inc_investigationStatus').value,
    resolutionNotes: document.getElementById('inc_resolutionNotes').value.trim(),
  };
  if(editingIncidentId){
    Object.assign(DATA.incidentReports.find(x=>x.id===editingIncidentId), payload);
  } else {
    DATA.incidentReports.push({ id: uid(), dateAdded: todayISO(), reportedBy: currentScope().userId, ...payload });
  }
  await saveData(); closeModal(); render();
  showToast(editingIncidentId ? 'Report updated' : 'Report filed');
}
async function deleteIncident(id){
  DATA.incidentReports = DATA.incidentReports.filter(x=>x.id!==id);

function renderTrainingView(){
  const courses = DATA.trainingCourses;
  const users = [...DATA.users].sort((a,b)=>a.name.localeCompare(b.name));
  const totalCells = users.length * courses.length;
  const completeCells = users.reduce((sum,u)=> sum + courses.filter(c=> (u.trainingStatus||{})[c.id]==='complete').length, 0);
  return `
    <div class="page-head">

      </div>

    ${courses.length ? `
    <div class="panel" style="overflow-x:auto;">
      <table style="min-width:${400+courses.length*140}px;">
        <thead>
          <tr>
            <th style="position:sticky; left:0; background:var(--white); z-index:1;">Employee</th>
            ${courses.map(c=>`<th style="text-align:center;">${esc(c.name)}</th>`).join('')}

        </thead>
        <tbody>

            <tr>

              ${courses.map(c=>{
                const status = (u.trainingStatus||{})[c.id] || 'pending';

                return `<td style="text-align:center; cursor:pointer;" onclick="toggleTraining('${u.id}','${c.id}')">

async function toggleTraining(userId, courseId){
  const u = DATA.users.find(x=>x.id===userId);

  u.trainingStatus = u.trainingStatus || {};

  await saveData(); render();

function bindKanbanDragDrop(){
  const board = document.getElementById('kanbanBoard');
  if(!board) return;
  let draggedId = null;
  board.querySelectorAll('.kanban-card').forEach(card=>{
    card.addEventListener('dragstart', e=>{ draggedId = card.dataset.id; card.classList.add('dragging'); });
    card.addEventListener('dragend', e=>{ card.classList.remove('dragging'); });
  });
  board.querySelectorAll('.kanban-col').forEach(col=>{
    col.addEventListener('dragover', e=>{ e.preventDefault(); col.classList.add('drag-over'); });
    col.addEventListener('dragleave', e=>{ col.classList.remove('drag-over'); });
    col.addEventListener('drop', async e=>{
      e.preventDefault(); col.classList.remove('drag-over');
      if(!draggedId) return;
      const deal = DATA.deals.find(d=>d.id===draggedId);
      const newStage = col.dataset.stage;
      if(!deal || deal.stage===newStage) return;
      if(isWonStage(newStage)){
        const missing = validateDealProgression(deal);
        if(missing.length){ showToast(`Fill in first: ${missing.join(', ')}`); return; }
      }
      deal.stage = newStage;
      if(isWonStage(newStage)){
        deal.wonDate = todayISO();
        const contact = DATA.contacts.find(c=>c.id===deal.contactId);
        if(contact && contact.type!=='customer'){
          const prevType = contact.type;
          contact.type = 'customer'; contact.wonDate = todayISO();
          evaluateWorkflowsForContact(contact, {kind:'type_changed', from:prevType, to:'customer'});
        }
        await notifyEvent('deal_closed', `"${deal.name}" was marked Won (${fmtMoney(deal.value)})`, contact);
      }
      await saveData(); render();
      showToast(`Moved "${deal.name}" to ${stageName(newStage)}`);
    });
  });
}

  const contact = DATA.contacts.find(c=>c.id===contactId);

    const d = DATA.deals.find(x=>x.id===editingDealId);
    const wasWon = isWonStage(d.stage);
    Object.assign(d, payload);
    if(isWonStage(newStage) && !wasWon){

      if(contact && contact.type!=='customer'){
        const prevType = contact.type;
        contact.type='customer'; contact.wonDate=todayISO();
        evaluateWorkflowsForContact(contact, {kind:'type_changed', from:prevType, to:'customer'});
      }
      await notifyEvent('deal_closed', `"${d.name}" was marked Won (${fmtMoney(d.value)})`, contact);
    }
  } else {
    const d = { id: uid(), dateAdded: todayISO(), wonDate: isWonStage(newStage)?todayISO():null, ...payload };
    DATA.deals.push(d);
    if(isWonStage(newStage) && contact && contact.type!=='customer'){

      evaluateWorkflowsForContact(contact, {kind:'type_changed', from:prevType, to:'customer'});

/* ===================== CSV IMPORT / EXPORT ===================== */
function csvEscape(v){
  v = (v==null?'':String(v));
  if(/[",\n]/.test(v)) return '"' + v.replace(/"/g,'""') + '"';
  return v;
}
function exportContactsCSV(type){
  const rows = DATA.contacts.filter(c=>c.type===type);
  const headers = ['name','company','type','stage','source','dealValue','followUpDate','dateAdded'];
  const lines = [headers.join(',')].concat(rows.map(c=> headers.map(h=>csvEscape(c[h])).join(',')));
  const blob = new Blob([lines.join('\n')], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `favze-crm-${type}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`Exported ${rows.length} ${typeLabel(type).toLowerCase()}(s)`);
}
function parseCSV(text){
  const lines = text.split(/\r?\n/).filter(l=>l.trim().length);
  if(!lines.length) return [];
  const parseLine = (line)=>{
    const out = []; let cur=''; let inQ=false;
    for(let i=0;i<line.length;i++){
      const ch = line[i];
      if(inQ){
        if(ch==='"' && line[i+1]==='"'){ cur+='"'; i++; }
        else if(ch==='"'){ inQ=false; }
        else cur+=ch;
      } else {
        if(ch==='"'){ inQ=true; }
        else if(ch===','){ out.push(cur); cur=''; }
        else cur+=ch;
      }
    }
    out.push(cur);
    return out;
  };
  const headers = parseLine(lines[0]).map(h=>h.trim());
  return lines.slice(1).map(line=>{
    const vals = parseLine(line);
    const obj = {};
    headers.forEach((h,i)=> obj[h] = (vals[i]||'').trim());
    return obj;
  });
}
async function handleCSVImport(input){
  const file = input.files[0];
  if(!file) return;
  const text = await file.text();
  const rows = parseCSV(text);
  const validTypes = ['prospect','lead','customer','past_customer'];
  let count = 0;
  rows.forEach(r=>{
    if(!r.name) return;
    const type = validTypes.includes((r.type||'').toLowerCase()) ? r.type.toLowerCase() : 'prospect';
    const companyId = r.company ? findOrCreateCompanyByName(r.company) : null;
    const c = {
      id: uid(), name: r.name, company: r.company||'', companyId, type,
      stage: r.stage||'', source: r.source||'CSV import',
      dealValue: Number(r.dealValue)||0, followUpDate: r.followUpDate||null,
      dateAdded: r.dateAdded || todayISO(), followUpDone:false, notes:[], responseHours:null,
      profile: defaultProfile(), tags:[], emailLists:[], services:[],
    };
    if(type==='customer'||type==='past_customer') c.wonDate = todayISO();
    if(type==='lead' && DATA.settings.roundRobin.enabled){
      const nextUser = getNextRoundRobinUser();
      if(nextUser) c.assignedTo = nextUser.id;
    }
    DATA.contacts.push(c);
    evaluateWorkflowsForContact(c, {kind:'created'});
    count++;
  });
  await saveData(); render();
  input.value = '';
  showToast(`Imported ${count} contact(s) from CSV`);
}

async function runConvert(){

      c.type = newType;
      if((newType==='customer'||newType==='past_customer') && !c.wonDate) c.wonDate = todayISO();

function hideGlobalSearch(){
  const box = document.getElementById('globalSearchResults');
  if(box) box.classList.remove('open');

function runGlobalSearch(term){
  const box = document.getElementById('globalSearchResults');
  if(!box) return;
  if(!term || term.trim().length < 2){ box.classList.remove('open'); return; }
  const s = term.toLowerCase();
  const contacts = DATA.contacts.filter(c=>(c.name+c.company).toLowerCase().includes(s)).slice(0,4);
  const deals = DATA.deals.filter(d=>(d.name+d.contactName).toLowerCase().includes(s)).slice(0,4);
  const projects = DATA.projects.filter(p=>(p.name+p.client).toLowerCase().includes(s)).slice(0,4);
  const tasks = DATA.tasks.filter(t=>t.title.toLowerCase().includes(s)).slice(0,4);
  const reminders = DATA.reminders.filter(r=>r.text.toLowerCase().includes(s)).slice(0,4);
  const groups = [
    {label:'Contacts', items:contacts, render:x=>({name:x.name, sub:typeLabel(x.type), onclick:`gsGo('${x.type}','${x.id}','contact')`})},
    {label:'Deals', items:deals, render:x=>({name:x.name, sub:fmtMoney(x.value), onclick:`gsGo('deals','${x.id}','deal')`})},
    {label:'Projects', items:projects, render:x=>({name:x.name, sub:x.status, onclick:`gsGo('project','${x.id}','project')`})},
    {label:'Tasks', items:tasks, render:x=>({name:x.title, sub:x.priority||'', onclick:`gsGo('task','${x.id}','task')`})},
    {label:'Reminders', items:reminders, render:x=>({name:x.text, sub:'', onclick:`gsGo('reminder','${x.id}','reminder')`})},
  ].filter(g=>g.items.length);
  if(!groups.length){ box.innerHTML = `<div class="gsr-empty">No matches for "${esc(term)}"</div>`; box.classList.add('open'); return; }
  box.innerHTML = groups.map(g=>`
    <div class="gsr-group">
      <div class="gsr-group-label">${g.label}</div>
      ${g.items.map(x=>{ const r=g.render(x); return `<div class="gsr-item" onclick="${r.onclick}"><span class="gsr-name">${esc(r.name)}</span><span class="gsr-sub">${esc(r.sub)}</span></div>`; }).join('')}
    </div>`).join('');
  box.classList.add('open');
}
function gsGo(view, id, kind){

}

function toggleRecording(){
  const btn = document.getElementById('recBtn');
  const box = document.getElementById('cl_transcript');
  if(activeRecognition){
    activeRecognition.stop();
    activeRecognition = null;
    btn.classList.remove('recording');
    btn.innerHTML = `${iconPhone()} Start live transcription`;
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.continuous = true;
  rec.interimResults = true;
  rec.lang = 'en-US';
  let finalText = box.value ? box.value + ' ' : '';
  rec.onresult = (e)=>{
    let interim = '';
    for(let i=e.resultIndex; i<e.results.length; i++){
      if(e.results[i].isFinal) finalText += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    box.value = finalText + interim;
  };
  rec.onerror = ()=>{ showToast('Microphone access needed for live transcription'); };
  rec.onend = ()=>{
    if(activeRecognition===rec){
      btn.classList.remove('recording');
      btn.innerHTML = `${iconPhone()} Start live transcription`;
      activeRecognition = null;
    }
  };
  rec.start();
  activeRecognition = rec;
  btn.classList.add('recording');
  btn.innerHTML = `<span class="rec-dot"></span> Stop transcription`;
}

/* ===================== TIMESHEETS (approval locks retrospective edits) ===================== */
function weekKey(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const day = (d.getDay()+6)%7; // Monday=0
  const monday = new Date(d); monday.setDate(d.getDate()-day);
  const y = monday.getFullYear();
  const jan1 = new Date(y,0,1);
  const week = Math.ceil((((monday-jan1)/86400000)+jan1.getDay()+1)/7);
  return `${y}-W${String(week).padStart(2,'0')}`;
}
function weekLabel(wk){
  const [y,w] = wk.split('-W');
  return `Week ${w}, ${y}`;
}
function isWeekLocked(userId, wk){
  return DATA.timesheetApprovals.some(a=>a.userId===userId && a.weekKey===wk);
}
function timesheetRows(){
  const groups = {};
  DATA.callLogs.forEach(cl=>{
    if(!cl.loggedBy) return;
    const wk = weekKey(cl.date);
    const key = cl.loggedBy+'|'+wk;
    if(!groups[key]) groups[key] = { userId: cl.loggedBy, weekKey: wk, totalMin:0, billableMin:0, count:0 };
    groups[key].totalMin += Number(cl.duration||0);
    if(cl.billable) groups[key].billableMin += Number(cl.duration||0);
    groups[key].count++;
  });
  return Object.values(groups).sort((a,b)=> b.weekKey.localeCompare(a.weekKey));
}

let calendarOffset = 0;
let calendarFilter = 'mine';
let calendarDeptFilter = null;
function monthMeta(offset){
  const d = new Date(); d.setDate(1); d.setMonth(d.getMonth()+offset);
  return { year: d.getFullYear(), month: d.getMonth() };
}
function buildMonthGrid(year, month){
  const first = new Date(year, month, 1);
  const startDay = (first.getDay()+6)%7;
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const cells = [];
  for(let i=0;i<startDay;i++){ const dt = new Date(year, month, 1-(startDay-i)); cells.push({date:dt, inMonth:false}); }
  for(let d=1; d<=daysInMonth; d++){ cells.push({date:new Date(year,month,d), inMonth:true}); }
  while(cells.length<42){ const last=cells[cells.length-1].date; const next=new Date(last); next.setDate(last.getDate()+1); cells.push({date:next, inMonth:false}); }
  return cells;
}
function dstr(d){ return d.toISOString().slice(0,10); }
function filteredEvents(){
  const {userId} = currentScope();
  if(calendarFilter==='mine') return DATA.events.filter(e=> (e.attendees||[]).includes(userId) || e.createdBy===userId);
  if(calendarFilter==='department' && calendarDeptFilter){
    const deptUserIds = DATA.users.filter(u=>u.department===calendarDeptFilter).map(u=>u.id);
    return DATA.events.filter(e=> (e.attendees||[]).some(a=>deptUserIds.includes(a)));
  }
  return DATA.events;
}

  {value:'vacation', label:'Vacation', color:'#E3A008'},

  {value:'birthday', label:'Birthday', color:'#e0468b', autoApprove:true, recurring:true},
  {value:'other', label:'Other', color:'#5B6B7C'},
];
function timeOffTypeMeta(v){ return TIME_OFF_TYPES.find(t=>t.value===v) || TIME_OFF_TYPES[TIME_OFF_TYPES.length-1]; }
function dateInRange(ds, start, end){ return ds>=start && ds<=(end||start); }
function timeOffOnDate(req, ds){
  if(!timeOffTypeMeta(req.type).recurring) return dateInRange(ds, req.startDate, req.endDate);
  return ds.slice(5) === req.startDate.slice(5); // MM-DD match, recurs every year
}
function isUserOutToday(userId){

/* ===================== .ICS SYNC (Outlook / Apple Calendar, no OAuth backend) ===================== */
function icsEscape(s){ return String(s||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n'); }
function icsDateTime(dateStr, timeStr){ return dateStr.replace(/-/g,'') + 'T' + (timeStr||'00:00').replace(':','') + '00'; }
function icsStamp(){ return new Date().toISOString().replace(/[-:]/g,'').split('.')[0] + 'Z'; }
function generateICS(events){
  const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Favze CRM//EN','CALSCALE:GREGORIAN'];
  events.forEach(e=>{
    lines.push('BEGIN:VEVENT');
    lines.push('UID:'+e.id+'@favze-crm');
    lines.push('DTSTAMP:'+icsStamp());
    lines.push('DTSTART:'+icsDateTime(e.date, e.startTime));
    lines.push('DTEND:'+icsDateTime(e.date, e.endTime||e.startTime));
    lines.push('SUMMARY:'+icsEscape((e.eventType==='call'?'Call: ':'')+e.title));
    if(e.location) lines.push('LOCATION:'+icsEscape(e.location));
    if(e.notes) lines.push('DESCRIPTION:'+icsEscape(e.notes));
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}
function downloadICS(filename, content){
  const blob = new Blob([content], {type:'text/calendar'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function exportCalendarICS(){
  const events = filteredEvents();
  if(!events.length){ showToast('No meetings or calls in this view to export'); return; }
  downloadICS('favze-crm-calendar.ics', generateICS(events));
  showToast(`Exported ${events.length} event(s). Open the file to add them to Outlook or Apple Calendar.`);
}
function exportSingleEventICS(id){
  const ev = DATA.events.find(x=>x.id===id);
  if(!ev) return;
  downloadICS((ev.title||'event').replace(/[^a-z0-9]+/gi,'-').toLowerCase()+'.ics', generateICS([ev]));
}
function parseICS(text){
  const lines = text.split(/\r?\n/);
  const events = [];
  let cur = null;
  lines.forEach(line=>{
    if(line.startsWith('BEGIN:VEVENT')){ cur = {}; }
    else if(line.startsWith('END:VEVENT')){ if(cur) events.push(cur); cur=null; }
    else if(cur){
      const idx = line.indexOf(':');
      if(idx<0) return;
      const key = line.slice(0,idx).split(';')[0];
      const val = line.slice(idx+1);
      if(key==='SUMMARY') cur.title = val.replace(/\\,/g,',').replace(/\\;/g,';').replace(/\\n/g,' ');
      if(key==='LOCATION') cur.location = val.replace(/\\,/g,',');
      if(key==='DESCRIPTION') cur.notes = val.replace(/\\,/g,',').replace(/\\n/g,' ');
      if(key==='DTSTART') Object.assign(cur, icsToDateTime(val));
      if(key==='DTEND') { const dt = icsToDateTime(val); cur.endTime = dt.startTime; }
    }
  });
  return events;
}
function icsToDateTime(val){
  val = val.replace('Z','');
  const datePart = val.slice(0,8);
  const date = `${datePart.slice(0,4)}-${datePart.slice(4,6)}-${datePart.slice(6,8)}`;
  let startTime = '09:00';
  if(val.includes('T')){
    const timePart = val.split('T')[1];
    startTime = `${timePart.slice(0,2)}:${timePart.slice(2,4)}`;
  }
  return { date, startTime };
}
async function handleICSImport(input){
  const file = input.files[0];
  if(!file) return;
  const text = await file.text();
  const parsed = parseICS(text);
  if(!parsed.length){ showToast('No events found in that file'); input.value=''; return; }
  parsed.forEach(p=>{
    DATA.events.push({
      id: uid(), eventType:'meeting', title: p.title||'Imported event',
      date: p.date||todayISO(), startTime: p.startTime||'09:00', endTime: p.endTime||p.startTime||'09:30',
      attendees: [currentScope().userId].filter(Boolean), contactId:null,
      location: p.location||'', notes: (p.notes||'') + (p.notes?' ':'') + '(Imported from calendar file)',
      createdBy: currentScope().userId, dateAdded: todayISO(),
    });
  });
  await saveData(); render();
  input.value = '';
  showToast(`Imported ${parsed.length} event(s) from your calendar file`);
}

function updateCharCounts(){
  const checked = Array.from(document.querySelectorAll('.platform-check')).filter(c=>c.checked).map(c=>c.value);
  const platforms = checked.map(platformMeta);
  const threadMode = document.getElementById('ct_threadMode') && document.getElementById('ct_threadMode').checked;
  if(threadMode){
    const segs = Array.from(document.querySelectorAll('.thread-seg-text'));
    const threadPlats = platforms.filter(p=>THREAD_PLATFORMS.includes(p.value));
    const out = segs.map((s,i)=>{
      const len = s.value.length;
      const bits = threadPlats.map(p=> `${p.label} ${len}/${p.limit}${len>p.limit?' ⚠️ over':''}`).join(' · ');
      return `Post ${i+1}: ${bits}`;
    }).join('<br>');
    const el = document.getElementById('ct_threadCharCounts');
    if(el) el.innerHTML = out;
  } else {
    const capEl = document.getElementById('ct_caption');
    const len = capEl ? capEl.value.length : 0;
    const nonThread = platforms.filter(p=>!THREAD_PLATFORMS.includes(p.value) || !threadMode);
    const out = platforms.map(p=>`${p.label} ${len}/${p.limit}${len>p.limit?' ⚠️ over':''}`).join(' · ');
    const el = document.getElementById('ct_charCounts');
    if(el) el.textContent = out;
  }
